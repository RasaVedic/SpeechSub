# ================================================================
# GitHub Actions — SpeechSub Auto Release Workflow
#
# Triggers on every push to main branch:
#   - Builds a debug APK (always)
#   - On version tag push (v*.*.*), builds a SIGNED release APK
#     and creates a GitHub Release with the APK attached.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   GOOGLE_SERVICES_JSON  — contents of google-services.json
#   KEYSTORE_BASE64       — base64-encoded keystore file
#   KEYSTORE_PASSWORD     — keystore password
#   KEY_ALIAS             — key alias inside the keystore
#   KEY_PASSWORD          — key password
#
# To create a release:
#   git tag v1.0.1
#   git push origin v1.0.1
# ================================================================

name: Build and Release APK

on:
  push:
    branches:
      - main           # Build debug APK on every push to main
    tags:
      - 'v*.*.*'       # Build + release signed APK on version tags

  pull_request:
    branches:
      - main           # Build debug APK to verify PRs compile

permissions:
  contents: write      # Required to create GitHub Releases and upload assets

jobs:
  # ============================================================
  # Job 1: Build Debug APK (runs on every push/PR)
  # ============================================================
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: speechsub-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ============================================================
  # Job 2: Build + Sign Release APK (runs only on version tags)
  # ============================================================
  build-release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/release.keystore

      - name: Build Signed Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/app/release.keystore" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            --no-daemon

      - name: Get tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name : ${{ steps.tag.outputs.TAG }}
          name     : "SpeechSub ${{ steps.tag.outputs.TAG }}"
          body     : |
            ## SpeechSub ${{ steps.tag.outputs.TAG }}

            ### What's New
            - See CHANGELOG for details

            ### Install
            1. Download `speechsub-release-${{ steps.tag.outputs.TAG }}.apk` below
            2. Enable "Install from unknown sources" in Android Settings
            3. Open the APK file to install

            ### Requirements
            - Android 8.0+ (API 26+)
          files    : app/build/outputs/apk/release/*.apk
          draft    : false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove keystore
        if: always()
        run: rm -f app/release.keystore

  # ============================================================
  # Job 3: Version Check Notification (informational)
  # ============================================================
  version-check:
    name: Check for Version Update
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-release

    steps:
      - name: Report version
        run: |
          echo "SpeechSub ${GITHUB_REF#refs/tags/} released successfully!"
          echo "APK attached to GitHub Release"
          echo "Users with version checking enabled will see the update notification"
