name: Build and Release APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — Debug APK (every push to main / PR)
  # ─────────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x SpeechSub/gradlew

      - name: Write google-services.json
        working-directory: SpeechSub/app
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > google-services.json
          else
            echo "No GOOGLE_SERVICES_JSON secret found, using repo file as-is"
          fi

      - name: Build Debug APK
        working-directory: SpeechSub
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SpeechSub-Debug-${{ github.sha }}
          path: SpeechSub/app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 2 — Signed Release APK (version tags only)
  # ─────────────────────────────────────────────
  build-release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x SpeechSub/gradlew

      - name: Write google-services.json
        working-directory: SpeechSub/app
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > google-services.json
          else
            echo "No GOOGLE_SERVICES_JSON secret, using repo file"
          fi

      - name: Decode keystore
        working-directory: SpeechSub/app
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Build Signed Release APK
        working-directory: SpeechSub
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Pandroid.injected.signing.store.file="${GITHUB_WORKSPACE}/SpeechSub/app/release.keystore" \
            -Pandroid.injected.signing.store.password="${KEYSTORE_PASSWORD}" \
            -Pandroid.injected.signing.key.alias="${KEY_ALIAS}" \
            -Pandroid.injected.signing.key.password="${KEY_PASSWORD}"

      - name: Get tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: SpeechSub ${{ steps.tag.outputs.TAG }}
          body: |
            ## SpeechSub ${{ steps.tag.outputs.TAG }}

            **Download the APK below and install on your Android device (8.0+).**

            ### How to Install
            1. Download `*.apk` from the Assets section below
            2. On your phone go to Settings → Security → Enable "Install from unknown sources"
            3. Open the downloaded APK and install

            ### Requirements
            - Android 8.0 or newer (API 26+)
          files: SpeechSub/app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up keystore
        if: always()
        run: rm -f SpeechSub/app/release.keystore
